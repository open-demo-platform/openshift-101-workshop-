name: modules
title: OpenShift 101
version: master
nav:
  - showroom/content/modules/ROOT/nav.adoc

asciidoc:
  attributes:
    lab_name: "OpenShift 101: Fundamentals"
    release-version: master
    page-pagination: true # enables navigation at bottom of each instruction page.

    # OpenShift cluster configuration (populated from user_data.yml)
    openshift_version: "4.14"
    openshift_cluster_domain: "{cluster_domain}"
    openshift_api_url: "{openshift_api_url}"
    openshift_console_url: "{openshift_console_url}"

    # User credentials (populated from user_data.yml)
    user: "{username}"
    password: "{password}"

    # Workshop settings (populated from user_data.yml)
    guid: "{guid}"
    page-toclevels: 2

    page-links:
    - url: https://docs.openshift.com/container-platform/4.14/
      text: OpenShift 4.14 Documentation
    - url: https://learn.openshift.com/
      text: OpenShift Interactive Learning Portal
    - url: https://www.redhat.com/en/technologies/cloud-computing/openshift
      text: Red Hat OpenShift Product Page
