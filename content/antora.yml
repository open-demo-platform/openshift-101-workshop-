name: modules
title: OpenShift 101
version: master
nav:
  - modules/ROOT/nav.adoc

asciidoc:
  attributes:
    lab_name: "OpenShift 101: Fundamentals"
    release-version: master
    page-pagination: true # enables navigation at bottom of each instruction page.

    # OpenShift cluster configuration (defaults - overridden by user_data.yml)
    openshift_version: "4.14"
    openshift_cluster_domain: "apps.example.com"
    openshift_api_url: "https://api.example.com:6443"
    openshift_console_url: "https://console-openshift-console.apps.example.com"

    # User credentials (populated by user_data.yml merge)
    user: "admin"
    password: ""

    # Workshop settings (populated by user_data.yml merge)
    guid: "showroom"
    page-toclevels: 2

    page-links:
    - url: https://docs.openshift.com/container-platform/4.14/
      text: OpenShift 4.14 Documentation
    - url: https://learn.openshift.com/
      text: OpenShift Interactive Learning Portal
    - url: https://www.redhat.com/en/technologies/cloud-computing/openshift
      text: Red Hat OpenShift Product Page
